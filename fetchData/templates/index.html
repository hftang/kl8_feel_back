<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福彩快乐8 数据分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
  .header { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; padding: 32px 20px; text-align: center; }
  .header h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 2px; }
  .header p { opacity: 0.85; font-size: 14px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .btn-row { text-align: center; margin: 24px 0; }
  .btn-fetch {
    background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; border: none; padding: 14px 48px;
    font-size: 18px; border-radius: 25px; cursor: pointer; transition: all .2s;
    box-shadow: 0 4px 15px rgba(231,76,60,.3);
  }
  .btn-fetch:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231,76,60,.4); }
  .btn-fetch:disabled { background: #95a5a6; box-shadow: none; cursor: not-allowed; transform: none; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 24px; overflow: hidden; }
  .card-title { padding: 16px 20px; font-size: 16px; font-weight: 600; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
  .card-title .icon { width: 20px; height: 20px; border-radius: 4px; }
  .card-title .count-badge { background: #e74c3c; color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: auto; }

  /* 开奖号码卡片列表 */
  .period-list { padding: 12px; max-height: 600px; overflow-y: auto; }
  .period-card {
    display: flex; align-items: center; gap: 16px; padding: 14px 16px;
    border-radius: 10px; margin-bottom: 8px; transition: all .15s;
    background: #fafbfc;
  }
  .period-card:hover { background: #fff3e6; box-shadow: 0 2px 8px rgba(231,76,60,.08); }
  .period-card:nth-child(odd) { background: #f8f9fa; }
  .period-card:nth-child(odd):hover { background: #fff3e6; }

  .period-info { min-width: 130px; flex-shrink: 0; }
  .period-num { font-size: 16px; font-weight: 700; color: #2c3e50; }
  .period-date { font-size: 12px; color: #95a5a6; margin-top: 2px; }
  .period-idx {
    width: 28px; height: 28px; border-radius: 50%; background: #ecf0f1;
    color: #7f8c8d; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .ball-row { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
  .ball {
    width: 34px; height: 34px; border-radius: 50%; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.15);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,.15), 0 2px 4px rgba(0,0,0,.1);
    background: linear-gradient(145deg, #5dade2, #2e86c1);
    transition: transform .15s;
  }
  .ball:hover { transform: scale(1.2); z-index: 1; }
  .ball.hot {
    background: linear-gradient(145deg, #f1948a, #e74c3c);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,.15), 0 2px 6px rgba(231,76,60,.3);
  }
  .ball.warm {
    background: linear-gradient(145deg, #f5b041, #e67e22);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,.15), 0 2px 6px rgba(230,126,34,.3);
  }
  .ball.normal {
    background: linear-gradient(145deg, #5dade2, #2e86c1);
  }
  .ball.cold {
    background: linear-gradient(145deg, #bdc3c7, #95a5a6);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.08);
  }

  /* 分隔线 */
  .period-card .sep {
    width: 1px; height: 36px; background: #e8e8e8; flex-shrink: 0;
  }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-img { width: 100%; height: auto; }
  .trend-chart-wrap { padding: 12px 16px 16px; }
  .trend-chart-wrap canvas { width: 100% !important; max-height: 320px; }
  @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

  .placeholder { text-align: center; padding: 80px 20px; color: #aaa; }
  .placeholder svg { width: 64px; height: 64px; fill: #ccc; margin-bottom: 16px; }
  .error { color: #e74c3c; text-align: center; padding: 40px; font-size: 16px; }

  /* 统计卡片 */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px; }
  @media (max-width: 900px) { .stat-grid { grid-template-columns: 1fr 1fr; } }
  .stat-box { text-align: center; padding: 16px 12px; border-radius: 10px; background: #f8f9fa; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #95a5a6; margin-top: 4px; }
  .stat-box:nth-child(1) .stat-val { color: #e74c3c; }
  .stat-box:nth-child(2) .stat-val { color: #3498db; }
  .stat-box:nth-child(3) .stat-val { color: #2ecc71; }
  .stat-box:nth-child(4) .stat-val { color: #f39c12; }

  .hot-cold-row { display: flex; gap: 24px; padding: 0 20px 20px; flex-wrap: wrap; }
  .hc-col { flex: 1; min-width: 220px; }
  .hc-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .hc-title .dot { width: 10px; height: 10px; border-radius: 50%; }
  .hc-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .hc-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 10px; border-radius: 8px; background: #f8f9fa; min-width: 56px;
  }
  .hc-num { font-size: 18px; font-weight: 700; }
  .hc-freq { font-size: 11px; color: #95a5a6; }

  /* 选号推荐 */
  .recommend-section { margin-top: 8px; }
  .pick-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .btn-pick {
    padding: 10px 22px; font-size: 15px; font-weight: 600; border: 2px solid #e74c3c;
    background: #fff; color: #e74c3c; border-radius: 25px; cursor: pointer; transition: all .2s;
  }
  .btn-pick:hover { background: #e74c3c; color: #fff; transform: translateY(-1px); }
  .btn-pick.active { background: #e74c3c; color: #fff; box-shadow: 0 4px 12px rgba(231,76,60,.3); }

  .rec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .rec-grid { grid-template-columns: 1fr; } }
  .rec-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); padding: 18px 20px; border-left: 4px solid #e74c3c; }
  .rec-card:nth-child(2) { border-left-color: #3498db; }
  .rec-card:nth-child(3) { border-left-color: #2ecc71; }
  .rec-card:nth-child(4) { border-left-color: #f39c12; }
  .rec-card:nth-child(5) { border-left-color: #9b59b6; }
  .rec-card:nth-child(6) { border-left-color: #1abc9c; }
  .rec-card:nth-child(7) { border-left-color: #e67e22; }
  .rec-card:nth-child(8) { border-left-color: #34495e; }
  .rec-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .rec-desc { font-size: 12px; color: #888; margin-bottom: 12px; }
  .rec-nums { display: flex; flex-wrap: wrap; gap: 8px; }
  .rec-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%; font-size: 15px; font-weight: 700;
    background: #e74c3c; color: #fff;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,.15), 0 2px 4px rgba(0,0,0,.1);
  }
  .rec-card:nth-child(2) .rec-num { background: #3498db; }
  .rec-card:nth-child(3) .rec-num { background: #2ecc71; }
  .rec-card:nth-child(4) .rec-num { background: #f39c12; }
  .rec-card:nth-child(5) .rec-num { background: #9b59b6; }
  .rec-card:nth-child(6) .rec-num { background: #1abc9c; }
  .rec-card:nth-child(7) .rec-num { background: #e67e22; }
  .rec-card:nth-child(8) .rec-num { background: #34495e; }

  .rec-loading { text-align: center; padding: 40px; color: #aaa; }

  /* 行选择 */
  .period-card { position: relative; }
  .period-card .sel-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 2px solid #d0d5dd;
    background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s; font-size: 14px; color: transparent;
  }
  .period-card .sel-btn:hover { border-color: #e74c3c; background: #fff5f5; }
  .period-card.selected .sel-btn {
    border-color: #e74c3c; background: #e74c3c; color: #fff;
  }
  .period-card.selected { background: #fff0ee !important; box-shadow: 0 2px 8px rgba(231,76,60,.12); }

  /* 浮动操作栏 */
  .select-bar {
    position: sticky; top: 0; z-index: 10; background: #2c3e50; color: #fff;
    padding: 12px 20px; border-radius: 10px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
  }
  .select-bar .sel-count { font-weight: 700; font-size: 15px; }
  .select-bar .sel-actions { margin-left: auto; display: flex; gap: 10px; }
  .select-bar .sel-actions button {
    padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s;
  }
  .btn-sel-clear { background: rgba(255,255,255,.15); color: #fff; }
  .btn-sel-clear:hover { background: rgba(255,255,255,.25); }
  .btn-sel-compare { background: #e74c3c; color: #fff; }
  .btn-sel-compare:hover { background: #c0392b; }

  /* 对比面板 */
  .compare-panel { margin-top: 0; }
  .compare-table-wrap { overflow-x: auto; padding: 0 20px 20px; }
  .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .compare-table th {
    background: #f0f2f5; padding: 10px 12px; text-align: left; font-weight: 600;
    white-space: nowrap; border-bottom: 2px solid #e0e0e0; position: sticky; top: 0;
  }
  .compare-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  .compare-table tr:hover td { background: #fafbfc; }
  .compare-table .ball-sm {
    width: 26px; height: 26px; border-radius: 50%; font-size: 11px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; margin: 1px;
    background: linear-gradient(145deg, #5dade2, #2e86c1);
    box-shadow: inset 0 -1px 3px rgba(0,0,0,.15), 0 1px 3px rgba(0,0,0,.1);
  }
  .compare-table .ball-sm.hot {
    background: linear-gradient(145deg, #f1948a, #e74c3c);
  }
  .compare-table .ball-sm.warm {
    background: linear-gradient(145deg, #f5b041, #e67e22);
  }
  .compare-table .ball-sm.cold {
    background: linear-gradient(145deg, #bdc3c7, #95a5a6);
  }
  .compare-empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
  .compare-stats { display: flex; gap: 24px; flex-wrap: wrap; padding: 16px 20px; border-top: 1px solid #eee; }
  .compare-stat-item { text-align: center; }
  .compare-stat-val { font-size: 20px; font-weight: 700; color: #2c3e50; }
  .compare-stat-label { font-size: 11px; color: #95a5a6; margin-top: 2px; }
  .compare-highlight { background: #fffde7; }
  .compare-table .col-remove {
    width: 32px; text-align: center; cursor: pointer; color: #ccc; font-size: 16px;
  }
  .compare-table .col-remove:hover { color: #e74c3c; }

</style>

<body>

<div class="header">
  <h1>&#127922; 福彩快乐8 数据分析</h1>
  <p>近100期开奖数据统计与趋势分析 + 智能选号推荐</p>
</div>

<div class="disclaimer-banner" style="max-width:1400px;margin:12px auto 0;padding:12px 18px;background:#fff3cd;border:1px solid #ffe58f;border-radius:6px;color:#5c3c00;font-size:13px;line-height:1.55;">
  <strong>⚠ 理性提示：</strong>
  快乐8每期从 1-80 中<strong>均匀随机</strong>抽取 20 个号码。任何"策略"选 k 个号码的<strong>期望命中数都是 k/4</strong>（选8个平均命中2个）。
  本页面所有推荐仅供组合参考与娱乐分析，<strong>不能提高中奖率</strong>。
  可点击「策略评估」查看每个策略在历史数据上的实际命中率 vs 基线的对比。请理性购彩。
</div>

<div class="container">
  <div class="btn-row">
    <button class="btn-fetch" id="fetchBtn" onclick="fetchData()">&#9889; 获取近100期数据</button>
    <button class="btn-fetch" id="btBtn" onclick="showBacktest()" style="background:#6c5ce7;">&#128200; 策略评估</button>
    <button class="btn-fetch" id="histBtn" onclick="showHistory()" style="background:#00b894;">&#128220; 历史推荐回顾</button>
  </div>

  <div id="content">
    <div class="placeholder">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
      <p>点击上方按钮获取数据</p>
    </div>
  </div>
</div>

<script>
const hotNumbers = new Set();
let savedData = null;
let savedCharts = null;

const warmNumbers = new Set();
const coldNumbers = new Set();
const selectedPeriods = new Set();

function toggleSelect(idx) {
  if (selectedPeriods.has(idx)) {
    selectedPeriods.delete(idx);
  } else {
    selectedPeriods.add(idx);
  }
  updateSelectUI();
}

function clearSelection() {
  selectedPeriods.clear();
  updateSelectUI();
}

function removeSelected(idx) {
  selectedPeriods.delete(idx);
  updateSelectUI();
}

function updateSelectUI() {
  // Update row styles
  document.querySelectorAll('.period-card').forEach(card => {
    const idx = parseInt(card.dataset.idx);
    if (selectedPeriods.has(idx)) {
      card.classList.add('selected');
      card.querySelector('.sel-btn').innerHTML = '\u2713';
    } else {
      card.classList.remove('selected');
      card.querySelector('.sel-btn').innerHTML = '';
    }
  });

  // Update select bar
  const bar = document.getElementById('selectBar');
  if (selectedPeriods.size > 0) {
    bar.style.display = 'flex';
    bar.querySelector('.sel-count').textContent = '\u2714 已选 ' + selectedPeriods.size + ' 期';
  } else {
    bar.style.display = 'none';
  }

  // Update comparison panel
  renderCompare();
}

function renderCompare() {
  const panel = document.getElementById('comparePanel');
  if (!savedData || selectedPeriods.size === 0) {
    panel.innerHTML = '';
    return;
  }

  const selected = Array.from(selectedPeriods).sort((a, b) => a - b).map(i => ({ idx: i, ...savedData[i] }));

  let html = '<div class="card compare-panel"><div class="card-title">\ud83d\udcca 选中期数对比 <span class="count-badge">' + selected.length + ' 期</span></div>';

  html += '<div class="compare-table-wrap"><table class="compare-table"><thead><tr>';
  html += '<th></th><th>期号</th><th>开奖日期</th><th>开奖号码</th><th>和值</th><th>奇数</th><th>偶数</th><th>大号(41-80)</th><th>小号(1-40)</th>';
  html += '</tr></thead><tbody>';

  const sums = [];
  const odds = [];
  const evens = [];
  const bigs = [];
  const smalls = [];

  selected.forEach(r => {
    const nums = r.numbers.map(n => parseInt(n));
    const sum = nums.reduce((a, b) => a + b, 0);
    const odd = nums.filter(n => n % 2 === 1).length;
    const even = 20 - odd;
    const big = nums.filter(n => n > 40).length;
    const small = 20 - big;
    sums.push(sum); odds.push(odd); evens.push(even); bigs.push(big); smalls.push(small);

    html += '<tr>';
    html += '<td class="col-remove" onclick="removeSelected(' + r.idx + ')" title="移除">\u2716</td>';
    html += '<td><strong>' + r.period + '</strong></td>';
    html += '<td>' + r.date + '</td>';
    html += '<td>';
    r.numbers.forEach(n => {
      const v = parseInt(n);
      let cls = 'ball-sm';
      if (hotNumbers.has(v)) cls = 'ball-sm hot';
      else if (warmNumbers.has(v)) cls = 'ball-sm warm';
      else if (coldNumbers.has(v)) cls = 'ball-sm cold';
      html += '<span class="' + cls + '">' + String(v).padStart(2, '0') + '</span>';
    });
    html += '</td>';
    html += '<td><strong>' + sum + '</strong></td>';
    html += '<td>' + odd + '</td>';
    html += '<td>' + even + '</td>';
    html += '<td>' + big + '</td>';
    html += '<td>' + small + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';

  // Summary stats
  if (selected.length > 1) {
    const avgSum = (sums.reduce((a,b)=>a+b,0) / sums.length).toFixed(1);
    const avgOdd = (odds.reduce((a,b)=>a+b,0) / odds.length).toFixed(1);
    const avgEven = (evens.reduce((a,b)=>a+b,0) / evens.length).toFixed(1);
    const avgBig = (bigs.reduce((a,b)=>a+b,0) / bigs.length).toFixed(1);
    const avgSmall = (smalls.reduce((a,b)=>a+b,0) / smalls.length).toFixed(1);
    const maxSum = Math.max(...sums);
    const minSum = Math.min(...sums);

    html += '<div class="compare-stats">';
    html += '<div class="compare-stat-item"><div class="compare-stat-val">' + avgSum + '</div><div class="compare-stat-label">平均和值</div></div>';
    html += '<div class="compare-stat-item"><div class="compare-stat-val">' + minSum + ' ~ ' + maxSum + '</div><div class="compare-stat-label">和值范围</div></div>';
    html += '<div class="compare-stat-item"><div class="compare-stat-val">' + avgOdd + ' / ' + avgEven + '</div><div class="compare-stat-label">平均奇/偶</div></div>';
    html += '<div class="compare-stat-item"><div class="compare-stat-val">' + avgBig + ' / ' + avgSmall + '</div><div class="compare-stat-label">平均大/小</div></div>';
    html += '</div>';
  }

  html += '</div>';
  panel.innerHTML = html;
}


function fetchData() {
  const btn = document.getElementById('fetchBtn');
  const content = document.getElementById('content');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>获取中...';
  content.innerHTML = '<div class="placeholder"><span class="spinner" style="width:32px;height:32px;border-width:4px"></span><p style="margin-top:16px">正在获取数据并生成分析图表...</p></div>';

  fetch('/api/fetch')
    .then(r => r.json())
    .then(res => {
      if (res.error) { content.innerHTML = '<div class="error">' + res.error + '</div>'; return; }
      savedData = res.data;
      savedCharts = res.charts;
      renderResults(res.data, res.charts);
    })
    .catch(e => { content.innerHTML = '<div class="error">请求失败: ' + e.message + '</div>'; })
    .finally(() => { btn.disabled = false; btn.innerHTML = '⚡ 获取近100期数据'; });
}

function renderResults(data, charts) {
  const freq = {};
  data.forEach(r => r.numbers.forEach(n => { const v = parseInt(n); freq[v] = (freq[v] || 0) + 1; }));
  hotNumbers.clear();
  warmNumbers.clear();
  coldNumbers.clear();
  Object.entries(freq).forEach(([n, c]) => {
    const v = parseInt(n);
    if (c >= 28) hotNumbers.add(v);
    else if (c >= 22) warmNumbers.add(v);
    else if (c < 14) coldNumbers.add(v);
  });

  const totalNums = data.length * 20;
  const avgSum = data.reduce((s, r) => s + r.numbers.reduce((a, b) => a + parseInt(b), 0), 0) / data.length;
  const maxFreq = Math.max(...Object.values(freq));
  const minFreq = Math.min(...Object.values(freq));

  let html = '';

  // 统计概览卡片
  html += '<div class="card"><div class="card-title">&#128202; 数据概览</div>';
  html += '<div class="stat-grid">';
  html += '<div class="stat-box"><div class="stat-val">' + data.length + '</div><div class="stat-label">总期数</div></div>';
  html += '<div class="stat-box"><div class="stat-val">' + totalNums + '</div><div class="stat-label">总开奖号码</div></div>';

function renderTrendChart(data) {
  const canvas = document.getElementById('trendCanvas');
  if (!canvas || !data || data.length === 0) return;
  // Chart.js 未加载（CDN 全线不可达）时降级：不画图，也不抛异常
  if (typeof Chart === 'undefined') {
    const parent = canvas.parentElement;
    if (parent) {
      parent.insertAdjacentHTML('beforeend',
        '<div style="padding:20px;text-align:center;color:#888;font-size:12px;">' +
        '（趋势图需要加载 Chart.js CDN，当前不可达。其它统计与图表功能不受影响。）</div>');
    }
    return;
  }

  // Data is newest first, reverse for chronological order
  const sorted = [...data].reverse();
  const labels = sorted.map(r => r.period.slice(-4));
  const sums = sorted.map(r => r.numbers.reduce((a, b) => a + parseInt(b), 0));
  const avg = sums.reduce((a, b) => a + b, 0) / sums.length;

  const ctx = canvas.getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '和值',
          data: sums,
          borderColor: '#2ecc71',
          backgroundColor: 'rgba(46,204,113,0.1)',
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: '#2ecc71',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointHoverBackgroundColor: '#e74c3c',
          pointHoverBorderColor: '#fff',
          fill: true,
          tension: 0.3,
        },
        {
          label: '平均值 (' + avg.toFixed(0) + ')',
          data: Array(sums.length).fill(avg),
          borderColor: '#e74c3c',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        tooltip: {
          backgroundColor: 'rgba(44,62,80,0.95)',
          titleFont: { size: 13, weight: 'bold' },
          bodyFont: { size: 12 },
          padding: 12,
          cornerRadius: 8,
          displayColors: false,
          callbacks: {
            title: function(items) {
              const idx = items[0].dataIndex;
              return '第 ' + sorted[idx].period + ' 期  (' + sorted[idx].date + ')';
            },
            label: function(item) {
              if (item.datasetIndex === 0) {
                return '和值: ' + item.raw;
              }
              return '平均值: ' + item.raw.toFixed(1);
            },
            afterBody: function(items) {
              const idx = items[0].dataIndex;
              const s = sums[idx];
              const diff = s - avg;
              const sign = diff >= 0 ? '+' : '';
              return ['偏离均值: ' + sign + diff.toFixed(1)];
            },
          },
        },
        legend: {
          position: 'top',
          labels: { usePointStyle: true, padding: 16, font: { size: 12 } },
        },
      },
      scales: {
        x: {
          ticks: { maxRotation: 45, font: { size: 10 }, maxTicksLimit: 25 },
          grid: { display: false },
        },
        y: {
          ticks: { font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,0.06)' },
        },
      },
    },
  });
}

function getRecommend(count, btn) {
  const row = btn.closest('.pick-row');
  document.querySelectorAll('.btn-pick').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('recResult');
  container.innerHTML = '<div class="rec-loading"><span class="spinner" style="width:24px;height:24px;border-width:3px;border-top-color:#e74c3c"></span><p style="margin-top:12px">正在生成推荐...</p></div>';

  fetch('/api/recommend?count=' + count)
    .then(r => r.json())
    .then(res => {
      if (res.error) { container.innerHTML = '<div class="error">' + res.error + '</div>'; return; }
      renderRecommendations(res.recommendations);
    })
    .catch(e => { container.innerHTML = '<div class="error">请求失败: ' + e.message + '</div>'; });
}

function getWarmRecommend(count, btn) {
  const row = btn.closest('.pick-row');
  row.querySelectorAll('.btn-pick').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

async function showBacktest() {
  const btn = document.getElementById('btBtn');
  btn.disabled = true; btn.textContent = '计算中…';
  const el = document.getElementById('content');
  el.innerHTML = '<div class="placeholder"><p>正在跑回测（对每一期用之前的数据算特征、和实际开奖对比），请稍候…</p></div>';
  try {
    const resp = await fetch('/api/backtest?count=8&window=50');
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'HTTP ' + resp.status);
    renderBacktest(data);
  } catch (e) {
    el.innerHTML = '<div class="placeholder"><p>回测失败：' + (e.message || e) + '</p><p style="font-size:12px;color:#888;">若提示历史期数不足，请多次点击「获取数据」以在数据库中累积历史。</p></div>';
  } finally {
    btn.disabled = false; btn.textContent = '📈 策略评估';
  }
}

function renderBacktest(data) {
  const baseline = data.baseline_mean;
  const strategies = data.strategies || [];
  const maxMean = Math.max(baseline * 1.5, ...strategies.map(s => Math.max(s.ci_high, s.mean_hits)));
  let html = '';
  html += '<div style="max-width:1400px;margin:0 auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">';
  html += '<h2 style="margin:0 0 6px;">策略评估（走向前回测）</h2>';
  html += '<p style="color:#666;font-size:13px;margin:0 0 14px;">每策略在历史每一期上用「之前的数据」生成推荐，再和实际开奖对比。基线 = count/4 = ' + baseline.toFixed(3) + '（选8个的期望命中数=2）。<strong>数学上任何策略的长期均值都会回归到基线</strong>——CI 覆盖基线是预期结果。</p>';
  html += '<p style="color:#666;font-size:12px;margin:0 0 14px;">回测参数：count=' + data.count + '，特征窗口=' + data.window + '期。</p>';

  // 图表：横向条形图
  html += '<div style="margin:20px 0;">';
  strategies.forEach(s => {
    const pct = (s.mean_hits / maxMean * 100).toFixed(2);
    const ciLowPct = (s.ci_low / maxMean * 100).toFixed(2);
    const ciHighPct = (s.ci_high / maxMean * 100).toFixed(2);
    const basePct = (baseline / maxMean * 100).toFixed(2);
    const color = s.strategy_id === 'uniform_random' ? '#95a5a6' : (s.significant ? '#e17055' : '#74b9ff');
    html += '<div style="margin:8px 0;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px;">';
    html += '<span><b>' + s.strategy_id + '</b>' + (s.strategy_id === 'uniform_random' ? ' <span style="color:#888;">（对照组）</span>' : '') + '</span>';
    html += '<span>' + s.mean_hits.toFixed(3) + '　n=' + s.n_periods + '　p=' + s.p_value.toFixed(3) + (s.significant ? ' <span style="color:#e17055;">*</span>' : '') + '</span>';
    html += '</div>';
    html += '<div style="position:relative;height:22px;background:#f4f4f4;border-radius:4px;">';
    // CI 区间
    html += '<div style="position:absolute;top:0;bottom:0;left:' + ciLowPct + '%;width:' + (ciHighPct - ciLowPct) + '%;background:' + color + '33;border-radius:4px;"></div>';
    // 均值条
    html += '<div style="position:absolute;top:0;bottom:0;left:0;width:' + pct + '%;background:' + color + ';border-radius:4px;"></div>';
    // 基线虚线
    html += '<div style="position:absolute;top:-2px;bottom:-2px;left:' + basePct + '%;width:2px;background:#2d3436;box-shadow:0 0 0 1px #fff;"></div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div style="font-size:12px;color:#666;margin-top:12px;">图注：横向条为策略均值；淡色宽带为 95% 置信区间；<b>竖黑线为基线</b> (' + baseline.toFixed(3) + ')。若某策略 CI 未覆盖基线且 p&lt;0.05（右侧标 *），先怀疑 look-ahead bug 而非"找到 alpha"——这是数学。</div>';

  // 详细表格
  html += '<table style="width:100%;margin-top:22px;border-collapse:collapse;font-size:13px;">';
  html += '<thead><tr style="background:#f8f9fa;"><th style="padding:8px;text-align:left;">策略</th><th style="padding:8px;text-align:right;">样本期数</th><th style="padding:8px;text-align:right;">均值</th><th style="padding:8px;text-align:right;">与基线差</th><th style="padding:8px;text-align:right;">95% CI</th><th style="padding:8px;text-align:right;">p 值</th></tr></thead>';
  html += '<tbody>';
  strategies.forEach(s => {
    html += '<tr style="border-top:1px solid #eee;">';
    html += '<td style="padding:8px;"><b>' + s.strategy_id + '</b></td>';
    html += '<td style="padding:8px;text-align:right;">' + s.n_periods + '</td>';
    html += '<td style="padding:8px;text-align:right;">' + s.mean_hits.toFixed(3) + '</td>';
    html += '<td style="padding:8px;text-align:right;color:' + (Math.abs(s.delta_vs_baseline)<0.1?'#666':'#e17055') + ';">' + (s.delta_vs_baseline>=0?'+':'') + s.delta_vs_baseline.toFixed(3) + '</td>';
    html += '<td style="padding:8px;text-align:right;">[' + s.ci_low.toFixed(3) + ', ' + s.ci_high.toFixed(3) + ']</td>';
    html += '<td style="padding:8px;text-align:right;">' + s.p_value.toFixed(3) + (s.significant ? ' *' : '') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderHistory(items) {
  const baselineHint = 'k/4';
  let html = '<div style="max-width:1400px;margin:0 auto;padding:20px;background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">';
  html += '<h2 style="margin:0 0 6px;">历史推荐回顾</h2>';
  html += '<p style="color:#666;font-size:13px;margin:0 0 14px;">每一次点击「获取推荐」都会自动存档；等目标期开奖后，系统会补算实际命中数。<b>基线：选 k 个平均命中 k/4</b>——绝大多数记录会在基线附近波动。</p>';
  if (items.length === 0) {
    html += '<div class="placeholder" style="padding:40px 20px;"><p>目前没有历史推荐记录。请先点击「获取近100期数据」或到主页面点击「获取推荐」积累数据，之后再回来查看。</p></div>';
    html += '</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }
  // 顶部聚合
  const evaluated = items.filter(x => x.hits !== null);
  const meanHits = evaluated.length ? (evaluated.reduce((a,b)=>a+b.hits,0) / evaluated.length) : null;
  if (meanHits !== null) {
    const avgCount = evaluated.reduce((a,b)=>a+b.count,0) / evaluated.length;
    const base = avgCount / 4;
    html += '<div style="padding:12px;background:#f8f9fa;border-radius:6px;margin-bottom:14px;font-size:13px;">';
    html += '已开奖且评估的记录：<b>' + evaluated.length + '</b> 条，平均命中 = <b>' + meanHits.toFixed(3) + '</b>，基线 = <b>' + base.toFixed(3) + '</b>';
    html += '</div>';
  }
  html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
  html += '<thead><tr style="background:#f8f9fa;"><th style="padding:8px;text-align:left;">创建时间</th><th style="padding:8px;text-align:left;">目标期</th><th style="padding:8px;text-align:left;">策略</th><th style="padding:8px;text-align:left;">推荐</th><th style="padding:8px;text-align:left;">实际开奖</th><th style="padding:8px;text-align:right;">命中</th></tr></thead>';
  html += '<tbody>';
  items.forEach(it => {
    const winSet = new Set(it.winning || []);
    const picksHtml = it.picks.map(n => {
      const hit = winSet.has(n);
      return '<span style="display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;margin:1px;border-radius:11px;font-size:11px;background:' + (hit?'#00b894':'#dfe6e9') + ';color:' + (hit?'#fff':'#2d3436') + ';">' + String(n).padStart(2,'0') + '</span>';
    }).join('');
    const winHtml = it.winning ? it.winning.map(n => '<span style="display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;margin:1px;border-radius:10px;font-size:10px;background:#ffeaa7;color:#2d3436;">' + String(n).padStart(2,'0') + '</span>').join('') : '<span style="color:#aaa;">未开奖</span>';
    const hitsHtml = it.hits === null ? '<span style="color:#aaa;">—</span>' : '<b style="color:' + (it.hits >= it.count/4 ? '#00b894' : '#636e72') + ';">' + it.hits + '/' + it.count + '</b>';
    html += '<tr style="border-top:1px solid #eee;">';
    html += '<td style="padding:6px;color:#666;font-size:11px;">' + (it.created_at || '') + '</td>';
    html += '<td style="padding:6px;">' + (it.target_period || '') + '</td>';
    html += '<td style="padding:6px;"><b>' + it.strategy_id + '</b></td>';
    html += '<td style="padding:6px;">' + picksHtml + '</td>';
    html += '<td style="padding:6px;">' + winHtml + '</td>';
    html += '<td style="padding:6px;text-align:right;">' + hitsHtml + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

</script>
</body>
</html>
