services:
  kl8:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.13
    image: kl8-feel-back:1.0.0-arm64
    container_name: kl8-feel-back
    platform: linux/arm64
    ports:
      - "5001:5001"
    environment:
      - HOST=0.0.0.0
      - PORT=5001
      - KL8_DB_PATH=/data/kl8.db
      - TZ=Asia/Shanghai
    volumes:
      - kl8-data:/data
    restart: unless-stopped

volumes:
  kl8-data:
